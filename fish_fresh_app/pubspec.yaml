name: fish_fresh_zm
description: FishCheck ZM - AI-powered fish freshness analyser for Zambia.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Fonts (loaded from Google Fonts CDN - no local files needed)
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.0

  # Navigation
  go_router: ^13.2.0

  # Networking & API
  http: ^1.2.0

  # Image picking (works on mobile, web, and Windows)
  image_picker: ^1.0.7
  file_picker: ^8.0.3

  # Permissions (mobile only - gracefully ignored on web/windows)
  permission_handler: ^11.3.0

  # Image compression (mobile only - skipped on web/windows)
  flutter_image_compress: ^2.3.0

  # Local storage
  shared_preferences: ^2.3.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.3.3

  # Sharing & links
  share_plus: ^9.0.0
  url_launcher: ^6.2.6

  # State management
  provider: ^6.1.2

  # Connectivity monitoring (offline queue)
  connectivity_plus: ^6.0.3

  # Machine learning - Phase 4
  tflite_flutter: ^0.10.4

  # Backend - Phase 5
  supabase_flutter: ^2.5.6
  cached_network_image: ^3.3.1

  # Polish & Launch - Phase 6
  flutter_local_notifications: ^17.2.2
  app_badge_plus: ^1.1.1
  package_info_plus: ^8.0.2
  flutter_native_splash: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/ml/

flutter_native_splash:
  color: "#0A7B5C"
  color_dark: "#065C44"
  image: assets/images/splash_logo.png
  android_12:
    image: assets/images/splash_logo.png
    icon_background_color: "#0A7B5C"
  fullscreen: true
